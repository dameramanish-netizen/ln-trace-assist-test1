    '.ltb-tree-btn{width:100%;text-align:left;background:#1E293B;color:#34D399;border:1px solid #334155;border-left:3px solid #34D399;border-radius:6px;padding:6px 8px;font-family:"JetBrains Mono",Consolas,monospace;font-size:11.5px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}',

    '.ltb-back-btn{align-self:flex-start;background:transparent;border:1px solid #334155;color:#93A4C3;padding:5px 10px;border-radius:6px;font-size:11.5px;cursor:pointer;margin-bottom:4px;}',
    '.ltb-back-btn:hover{color:#F2A93C;border-color:#F2A93C;}',
    '.ltb-anchor-card{background:#1E293B;border-top:3px solid #34D399;border-radius:8px;padding:8px;margin-bottom:6px;font-family:"JetBrains Mono",Consolas,monospace;font-size:11.5px;color:#E2E8F0;word-break:break-word;}',

    '@media (max-width:480px){#ltb-panel{position:fixed;inset:0;width:100vw;height:100vh;max-width:100vw;max-height:100vh;border-radius:0;bottom:0;right:0;}#ltb-root{inset:auto 12px 12px auto;}.ltb-compare-grid{grid-template-columns:1fr;}}'
  ].join('\n');

  var styleEl = document.createElement('style');
  styleEl.textContent = CSS;
  document.head.appendChild(styleEl);

  /* ============================ LAZY NLP =============================== */
  var nlpPromise = null;
  function ensureNLP() {
    if (window.nlp) return Promise.resolve(window.nlp);
    if (!nlpPromise) {
      nlpPromise = new Promise(function(resolve, reject) {
        var s = document.createElement('script');
        s.src = 'https://unpkg.com/compromise';
        s.onload = function() { resolve(window.nlp); };
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }
    return nlpPromise;
  }

  /* ============================== STREAMING CORE ============================== */
  async function processStreamedFile(file, onLineRead, onStatusUpdate) {
    let stream = file.stream();
    if (file.name.toLowerCase().endsWith('.gz')) {
      stream = stream.pipeThrough(new DecompressionStream('gzip'));
    }
    const textStream = stream.pipeThrough(new TextDecoderStream());
    const reader = textStream.getReader();
    let remainder = '';
    let lineCount = 0;

    try {
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunkString = remainder + (value || '');
        const lines = chunkString.split(/\r?\n/);
        remainder = lines.pop(); 
        for (let i = 0; i < lines.length; i++) {
          lineCount++;
          const breakStream = onLineRead(lines[i], lineCount);
          if (breakStream) return lineCount; 
        }
        if (lineCount % 250000 === 0) {
            if (onStatusUpdate) onStatusUpdate(lineCount);
            await new Promise(resolve => setTimeout(resolve, 0));
        }
      }
      if (remainder) {
        lineCount++;
        onLineRead(remainder, lineCount);
      }
      return lineCount;
    } catch (e) {
      console.error("Streaming error:", e);
      throw e;
    } finally {
      reader.releaseLock();
    }
  }

  function timeToMs(t) {
    var m = /(\d{2}):(\d{2}):(\d{2})\.(\d{3})/.exec(t);
    if (!m) return null;
    return (((+m[1] * 60 + +m[2]) * 60 + +m[3]) * 1000) + (+m[4]);
  }

  var BLACKLIST = ['ottstptcserver'];
  var TARGETS = ['dal.handle.field.error', '__dal.set.message(', 'form.text$('];

  /* =============================== FLOWS ================================== */
  
  // 1. DEBUGGER & AUDIT FLOW
  function startDebuggerFlow(preset) {
    preset = preset || {};
    var isAuto = preset.autoRun === true;
    
    var container = document.createElement('div');
    var dz = createDropzone('.txt,.log,.gz', '📎 Upload trace file', async function (file) {
      if (isAuto) {
        var statusEl = document.createElement('div');
        statusEl.className = 'ltb-upload-status';
        container.appendChild(statusEl);
        
        await executeDebugScan(
            file, 
            preset.presetKeywords || [], 
            preset.presetDal !== false, 
            preset.presetDepth || false, 
            true, 
            statusEl, 
            preset.presetAudit,
            preset.presetDirectStack
        );
      } else {
        proceedToConfig(file);
      }
    });
    container.appendChild(dz);
    addMessage('bot', container);

    function proceedToConfig(file) {
      var wrap = document.createElement('div'); wrap.className = 'ltb-config';
      var kw = createKeywordInput();
      var dalCheck = createCheckbox('DAL error filter', true);
      var depthCheck = createCheckbox('Depth marker filter', false);
      var tsCheck = createCheckbox('Truncate timestamps in stack', true);
      
      wrap.appendChild(labelWrap('Keywords (Requires ALL to match)', kw.el));
      wrap.appendChild(dalCheck.el); wrap.appendChild(depthCheck.el); wrap.appendChild(tsCheck.el);
      
      var statusEl = document.createElement('div'); statusEl.className = 'ltb-upload-status';
      wrap.appendChild(statusEl);

      wrap.appendChild(createButton('▶ Run search', async function () {
        userText('Run manual search');
        await executeDebugScan(file, kw.getKeywords(), dalCheck.checked(), depthCheck.checked(), tsCheck.checked(), statusEl, false, false);
      }, 'primary'));
      addMessage('bot', wrap);
    }

    async function executeDebugScan(file, queries, incDal, incDepth, useTs, statusEl, isAudit, isDirectStack) {
      statusEl.textContent = 'Scanning ' + file.name + '...';
      let matches = [], displayMatches = [], capped = false, pendingFormText = false;
      let auditCount = 0;
      let callOccurrencesCount = 0; 
      
      let directStackMap = {}; 
      let firstStackOutput = null;

      await processStreamedFile(file, (line) => {
        if (BLACKLIST.some(b => line.includes(b))) return false;
        let clean = line.trim();
        
        var sm = clean.match(/:::\(\d+\):/);
        var sid = sm ? sm[0] : 'main';
        if (!directStackMap[sid]) directStackMap[sid] = {};

        if (clean.includes('-->>') && clean.includes('(depth') && clean.includes('(in object')) {
            let dm = clean.match(/\(depth\s+(\d+)\)/);
            if (dm) directStackMap[sid][parseInt(dm[1], 10)] = clean;
        }

        let matchesAllQs = queries.length > 0 ? queries.every(q => clean.toLowerCase().includes(q.toLowerCase())) : false;
        
        if (matchesAllQs) {
            // Track total access count for Audits
            if (isAudit) {
                auditCount++;
                return false;
            }

            // Only count it as an actionable "Calling Occurrence" if it contains the entry marker
            let isCallingLine = clean.includes('-->>');
            if (isCallingLine) {
                callOccurrencesCount++;
            }

            matches.push(clean);
            displayMatches.push(clean);

            // Snapshot the very first call line stack context we discover
            if (isCallingLine && callOccurrencesCount === 1) {
                let dm = clean.match(/\(depth\s+(\d+)\)/);
                let targetDepth = dm ? parseInt(dm[1], 10) : 0;
                let output = [];

                if (targetDepth > 0) {
                    let validDepths = Object.keys(directStackMap[sid]).map(Number).filter(d => d <= targetDepth).sort((a,b)=>a-b);
                    for (let j = 0; j < validDepths.length; j++) {
                        let t = directStackMap[sid][validDepths[j]];
                        if (useTs && t.includes('-->>')) t = t.slice(t.indexOf('-->>'));
                        output.push(t);
                    }
                }
                if (!clean.includes('-->>')) output.push(clean);
                firstStackOutput = output;
            }
            
            if (matches.length >= 1000) { capped = true; return true; }
        }
        return false; 
      }, (linesRead) => { statusEl.textContent = `Scanned ${linesRead.toLocaleString()} lines...`; });
      
      statusEl.textContent = 'Scan complete.';
      
      if (isAudit) {
          botText('<b>Audit Summary:</b> <code>' + queries.join(' + ') + '</code> was found <b>' + auditCount.toLocaleString() + '</b> times in this trace.');
          return;
      }

      // Smart routing evaluation
      if (isDirectStack || queries.length > 0) {
          if (matches.length === 0) {
              botText('Could not find any entries for <code>' + queries.join(' + ') + '</code>.');
          } else if (callOccurrencesCount === 1) {
              // Direct Stack trigger: EXACTLY ONE calling execution track detected
              botText('<b>Auto-Stack Triggered:</b> Exact 1 calling occurrence found for <code>' + queries.join(' + ') + '</code>.');
              var pre = document.createElement('pre');
              pre.className = 'ltb-pre';
              pre.textContent = firstStackOutput.join('\n\n') || "Could not find parent stack context records.";
              addMessage('bot', pre);
          } else {
              // Ambiguity fallback: Multiple call events exist, make user select via interactive interface
              if (callOccurrencesCount > 1) {
                  botText('Found <b>' + callOccurrencesCount + '</b> calling occurrences of <code>' + queries.join(' + ') + '</code>. Click the precise instance sequence you need the stack map for:');
              } else {
                  botText('Found matches but no structured entry boundaries (`-->>`). Displaying raw filter matches:');
              }
              showDebugResults(matches, displayMatches, capped, useTs, file);
          }
      } else {
          showDebugResults(matches, displayMatches, capped, useTs, file);
      }
    }

    function showDebugResults(matches, displayMatches, capped, useTs, file) {
      if (!matches.length) { botText('No matching lines found.'); return; }
      if (capped) { botText('Capped at 1,000 matches.'); }
      
      var rows = displayMatches.map(l => [l]);
      var table = createTable(['Filtered trace output'], rows, async function (i) {
        var selected = matches[i];
        userText('View stack → line ' + (i + 1));
        if (!selected.includes('(depth')) { botText('No structured depth marker found to rebuild stack.'); return; }

        var sessionMatch = selected.match(/:::\(\d+\):/);
        var sessionId = sessionMatch ? sessionMatch[0] : null;
        var targetDepth = parseInt(selected.split('(depth')[1].split(')')[0].trim(), 10) || 0;
        if (targetDepth <= 0) { botText('Top-level call (depth 0) — no parent stack.'); return; }

        botText('<i>Streaming file again to extract stack history...</i>');
        let stackMap = {}, stackOutput = [];
        
        await processStreamedFile(file, (line) => {
            let clean = line.trim();
            if (sessionId && !clean.includes(sessionId)) return false;
            if (clean.includes('-->>') && clean.includes('(depth') && clean.includes('(in object')) {
                if (!BLACKLIST.some(b => clean.includes(b))) {
                    try { stackMap[parseInt(clean.split('(depth')[1].split(')')[0].trim(), 10)] = clean; } catch (e) { }
                }
            }
            if (clean.includes(selected)) {
                let validDepths = Object.keys(stackMap).map(Number).filter(d => d <= targetDepth).sort((a,b)=>a-b);
                for (let j = 0; j < validDepths.length; j++) {
                    let t = stackMap[validDepths[j]];
                    if (useTs && t.includes('-->>')) t = t.slice(t.indexOf('-->>'));
                    stackOutput.push(t.trim());
                }
                return true; 
            }
            return false;
        });

        var pre = document.createElement('pre'); pre.className = 'ltb-pre'; pre.textContent = stackOutput.join('\n\n') || "Could not find stack history.";
        addMessage('bot', pre);
      });
      addMessage('bot', table);
    }
  }

  // 2. PERFORMANCE FLOW
  function startPerformanceFlow(preset) {
    preset = preset || {};
    var isAuto = preset.autoRun === true;
    var threshold = preset.presetThreshold || 10;
    
    var container = document.createElement('div');
    var dz = createDropzone('.txt,.log,.gz', '📎 Upload trace file', async function (file) {
      if (isAuto) {
        var statusEl = document.createElement('div'); statusEl.className = 'ltb-upload-status'; container.appendChild(statusEl);
        await executePerfScan(file, threshold, statusEl);
      } else {
        proceedToThreshold(file);
      }
    });
    container.appendChild(dz);
    addMessage('bot', container);

    function proceedToThreshold(file) {
      var wrap = document.createElement('div'); wrap.className = 'ltb-config';
      wrap.appendChild(createSlider(0, 500, threshold, function (v) { threshold = v; }));
      var statusEl = document.createElement('div'); statusEl.className = 'ltb-upload-status'; wrap.appendChild(statusEl);
      wrap.appendChild(createButton('▶ Analyze', async function () {
        userText('Analyze (> ' + threshold + 'ms)');
        await executePerfScan(file, threshold, statusEl);
      }, 'primary'));
      addMessage('bot', wrap);
    }

    async function executePerfScan(file, thresh, statusEl) {
        statusEl.textContent = 'Streaming and analyzing...';
        let stack = [], slow = [];
        let entryRe = /\[(\d{2}:\d{2}:\d{2}\.\d{3})\].*?-->>\s+\(depth\s+\d+\):\s+(.*?)\((.*?)\)\s+\(in object\s+(.*?)\)/;
        let exitRe = /\[(\d{2}:\d{2}:\d{2}\.\d{3})\].*?<<--\s+\(depth\s+\d+\):\s+(.*)/;
        let tableRe = /"([^"]+)"/;

        let totalLines = await processStreamedFile(file, (line, count) => {
            let em = entryRe.exec(line);
            if (em) {
                var tableName = 'N/A';
                var tm = tableRe.exec(em[3]);
                if (tm && tm[1].trim()) tableName = tm[1].trim();
                else if (em[3].includes('whinh') || em[3].includes('ttadv')) {
                    var wm = em[3].match(/[a-z]{5}\d{3}/g);
                    if (wm && wm.length) tableName = wm[0];
                }
                var startMs = timeToMs(em[1]);
                if (startMs !== null) stack.push({ name: em[2].trim(), table: tableName, start: startMs, object: em[4].trim() });
                return false;
            }
            var xm = exitRe.exec(line);
            if (xm && stack.length) {
                var endMs = timeToMs(xm[1]);
                var popInfo = stack.pop();
                if (endMs !== null) {
                    var duration = endMs - popInfo.start;
                    if (duration < 0) duration += 86400000;
                    if (duration > thresh) {
                        slow.push({ line: count, functionName: popInfo.name, tableName: popInfo.table, durationMs: Math.round(duration * 100) / 100, executingObject: popInfo.object });
                    }
                }
            }
            return false;
        }, (linesRead) => { statusEl.textContent = `Scanned ${linesRead.toLocaleString()} lines...`; });

        statusEl.textContent = 'Scan complete.';
        showPerfResults({ slow, lineCount: totalLines }, thresh);
    }

    function showPerfResults(res, threshold) {
      botText('Scanned <b>' + res.lineCount.toLocaleString() + '</b> lines. Found <b>' + res.slow.length.toLocaleString() + '</b> call(s) slower than ' + threshold + 'ms.');
      if (!res.slow.length) return;
      var sorted = res.slow.slice().sort((a, b) => b.durationMs - a.durationMs);
      var rows = sorted.slice(0, Math.min(500, sorted.length)).map(s => [s.functionName, s.tableName, s.durationMs.toFixed(2), s.executingObject]);
      addMessage('bot', createTable(['Function', 'Table', 'Duration (ms)', 'Object'], rows));
    }
  }

  // 3. COMPARE FLOW
  function startCompareFlow() {
    botText('Upload your working trace and the broken trace to build a side-by-side call tree.');
    var grid = document.createElement('div'); grid.className = 'ltb-compare-grid';
    var colA = document.createElement('div'); colA.className = 'ltb-compare-col'; colA.innerHTML = '<div class="ltb-compare-title ltb-compare-title-ok">✅ Working trace</div>';
    var colB = document.createElement('div'); colB.className = 'ltb-compare-col'; colB.innerHTML = '<div class="ltb-compare-title ltb-compare-title-bad">❌ Broken trace</div>';
    
    var dataA = null, dataB = null;
    async function streamLinearScan(file, targetArr) {
        let depthRe = /\(depth\s+(\d+)\):/;
        await processStreamedFile(file, (line, idx) => {
            if (!line.trim()) return false;
            let dm = depthRe.exec(line);
            targetArr.push({
                idx: idx, text: (line.includes('Flow:') ? line.split('Flow:').pop() : ' ' + line.trim()).trim(),
                raw: line, depth: dm ? parseInt(dm[1], 10) : 0, isCall: line.includes('-->'), isReturn: line.includes('<--')
            });
            if (targetArr.length >= 50000) return true; // Safety cap
            return false;
        });
    }

    colA.appendChild(createDropzone('.txt,.log,.gz', '📎 Upload working', async function (f) { dataA = []; await streamLinearScan(f, dataA); }));
    colB.appendChild(createDropzone('.txt,.log,.gz', '📎 Upload broken', async function (f) { dataB = []; await streamLinearScan(f, dataB); }));
    grid.appendChild(colA); grid.appendChild(colB); addMessage('bot', grid);

    var kwWrap = document.createElement('div'); kwWrap.className = 'ltb-config';
    var kw = createKeywordInput(); kwWrap.appendChild(labelWrap('Filter root nodes', kw.el));
    kwWrap.appendChild(createButton('🔍 Build explorers', function () {
      userText('Build explorers');
      var explorerGrid = document.createElement('div'); explorerGrid.className = 'ltb-compare-grid';
      var explA = document.createElement('div'); explA.className = 'ltb-explorer';
      var explB = document.createElement('div'); explB.className = 'ltb-explorer';
      explorerGrid.appendChild(explA); explorerGrid.appendChild(explB);

      var keywords = kw.getKeywords();
      var focusA = [], focusB = [];
      function renderA() { renderExplorer(explA, dataA || [], keywords, focusA, renderA); }
      function renderB() { renderExplorer(explB, dataB || [], keywords, focusB, renderB); }
      if (dataA) renderA(); else explA.innerHTML = '<div class="ltb-empty">No trace.</div>';
      if (dataB) renderB(); else explB.innerHTML = '<div class="ltb-empty">No trace.</div>';
      addMessage('bot', explorerGrid);
    }, 'primary'));
    addMessage('bot', kwWrap);
  }

  /* ============================ SMART ROUTER ============================== */
  
  async function handleUserMessage(msg) {
    const nlp = await ensureNLP();
    let rawLower = msg.toLowerCase().trim();
    let doc = nlp(rawLower);

    if (rawLower === 'hi' || rawLower === 'hello' || rawLower === 'menu' || rawLower === 'help') {
      showMainMenu();
      return;
    }

    // Extract Entities
    let tableMatch = rawLower.match(/[a-z]{5}\d{3}/g) || []; 
    let funcMatch = rawLower.match(/[a-z0-9_]+\.[a-z0-9_\.]+/g) || []; 
    
    let isSingleWord = rawLower.indexOf(' ') === -1;
    let singleWordMatch = (isSingleWord && tableMatch.length === 0 && funcMatch.length === 0) ? [rawLower] : [];

    let targetKeywords = [...new Set([...tableMatch, ...funcMatch, ...singleWordMatch])];
    let hasKeywords = targetKeywords.length > 0;

    // Detect Intent Triggers
    let isErrorIntent = doc.has('(error|bug|fail|failed|issue|dal|crash|exception)');
    let isSearchIntent = doc.has('(function|occurrences|occurrence|find|search|give|show|all)') || rawLower.includes('ocearence') || rawLower.includes('occurence');
    let wantsStack = doc.has('(stack|trace|tree)');
    let isAuditIntent = doc.has('(audit|summary|count|how many|total)');
    let isPerfIntent = doc.has('(slow|hang|hanging|performance|speed|delay|time|long|longest)');
    let isCompareIntent = doc.has('(compare|difference|diverge|working|broken|diff)');

    if (isAuditIntent) {
        if (hasKeywords) {
            botText('I will perform a high-speed audit for <b>' + targetKeywords.join(' + ') + '</b>. Please upload the trace file.');
            startDebuggerFlow({ autoRun: true, presetKeywords: targetKeywords, presetAudit: true });
        } else {
            botText('Which table or function do you want to audit? Please specify a name like <i>tdsls401</i>.');
        }
    } 
    else if (isPerfIntent) {
      let timeValues = doc.numbers().out('array');
      let threshold = timeValues.length > 0 ? parseInt(timeValues[0], 10) : 50;
      botText('Let\'s check performance. I will scan for operations taking longer than <b>' + threshold + 'ms</b>. Please upload the trace.');
      startPerformanceFlow({ autoRun: true, presetThreshold: threshold });
    } 
    else if (isCompareIntent) {
      botText('I will map out the call trees. Upload the working trace and the broken trace to see where they diverge.');
      startCompareFlow();
    } 
    else if (isErrorIntent || isSearchIntent || wantsStack || hasKeywords) {
      let reply = 'I can map that out for you. Upload the trace file below.';
      
      if (wantsStack && hasKeywords) {
          reply = 'I will scan for the stack history of <b>' + targetKeywords.join(' + ') + '</b>. Upload the trace.';
      } else if (hasKeywords) {
          reply = 'I will hunt down lines matching <b>' + targetKeywords.join(' + ') + '</b>. Upload the trace.';
      } else if (isErrorIntent) {
          reply = 'I will scan for errors and DAL exceptions. Upload the trace.';
      }
      
      botText(reply);
      startDebuggerFlow({ 
          autoRun: true, 
          presetKeywords: hasKeywords ? targetKeywords : (isErrorIntent ? ['error', 'dal'] : []), 
          presetDal: isErrorIntent && !hasKeywords, 
          presetDepth: hasKeywords && !wantsStack, 
          presetDirectStack: wantsStack || hasKeywords // Trigger adaptive evaluation for keyword targets
      });
    } 
    else {
      botText('I am not sure I understand. Try asking me things like:<br><i>"Give me a stack of spool.open"</i><br><i>"Which function took a long time?"</i><br><i>"Audit tdsls401"</i>');
    }
  }

  /* ============================ UI PRIMITIVES ============================= */
  var messagesEl;
  function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }
  
  function addMessage(role, contentEl) { 
    var wrap = document.createElement('div'); wrap.className = 'ltb-msg ltb-msg-' + role; 
    var bubble = document.createElement('div'); bubble.className = 'ltb-bubble'; bubble.appendChild(contentEl); 
    wrap.appendChild(bubble); messagesEl.appendChild(wrap); scrollToBottom(); 
    return { wrap: wrap, bubble: bubble }; 
  }
  
  function botText(html) { var d = document.createElement('div'); d.className = 'ltb-text'; d.innerHTML = html; return addMessage('bot', d).wrap; }
  function userText(text) { var d = document.createElement('div'); d.className = 'ltb-text'; d.textContent = text; return addMessage('user', d).wrap; }
  
  function quickReplies(options) { 
    var wrap = document.createElement('div'); wrap.className = 'ltb-quick-replies'; 
    options.forEach(function (o) { 
      var b = document.createElement('button'); b.className = 'ltb-chip'; b.textContent = o.label; 
      b.onclick = function () { Array.from(wrap.children).forEach(bb => bb.disabled = true); userText(o.label); o.onClick(); }; 
      wrap.appendChild(b); 
    }); 
    return addMessage('bot', wrap).wrap; 
  }
  
  function createDropzone(accept, label, onFile) {
    var wrap = document.createElement('div'); wrap.className = 'ltb-dropzone';
    var input = document.createElement('input'); input.type = 'file'; input.accept = accept; input.style.display = 'none';
    var btn = document.createElement('button'); btn.type = 'button'; btn.className = 'ltb-upload-btn'; btn.textContent = label; btn.onclick = function () { input.click(); };
    var status = document.createElement('span'); status.className = 'ltb-upload-status';
    input.onchange = function () {
      if (!input.files.length) return;
      btn.style.borderColor = '#34D399'; btn.style.color = '#34D399'; btn.textContent = '✓ ' + input.files[0].name;
      onFile(input.files[0]);
    };
    wrap.appendChild(btn); wrap.appendChild(input); wrap.appendChild(status);
    return wrap;
  }

  function createCheckbox(label, checked) { var wrap = document.createElement('label'); wrap.className = 'ltb-checkbox'; var input = document.createElement('input'); input.type = 'checkbox'; input.checked = checked; var span = document.createElement('span'); span.textContent = label; wrap.appendChild(input); wrap.appendChild(span); return { el: wrap, checked: function () { return input.checked; } }; }
  function labelWrap(labelText, el) { var wrap = document.createElement('div'); var lab = document.createElement('div'); lab.className = 'ltb-field-label'; lab.textContent = labelText; wrap.appendChild(lab); wrap.appendChild(el); return wrap; }
  function createKeywordInput() { var wrap = document.createElement('div'); var list = document.createElement('div'); list.className = 'ltb-kw-list'; var input = document.createElement('input'); input.type = 'text'; input.placeholder = 'Type a keyword and press Enter'; input.className = 'ltb-kw-input'; var keywords = []; function renderChips() { list.innerHTML = ''; keywords.forEach(function (k, i) { var chip = document.createElement('span'); chip.className = 'ltb-kw-chip'; chip.textContent = k + ' ✕'; chip.onclick = function () { keywords.splice(i, 1); renderChips(); }; list.appendChild(chip); }); } input.addEventListener('keydown', function (e) { if (e.key === 'Enter') { e.preventDefault(); var v = input.value.trim(); if (v && keywords.indexOf(v) === -1) { keywords.push(v); renderChips(); } input.value = ''; } }); wrap.appendChild(list); wrap.appendChild(input); return { el: wrap, getKeywords: function () { return keywords.slice(); } }; }
  function createSlider(min, max, val, onChange) { var wrap = document.createElement('div'); wrap.className = 'ltb-slider-wrap'; var label = document.createElement('div'); label.className = 'ltb-slider-label'; label.textContent = 'Threshold: ' + val + ' ms'; var input = document.createElement('input'); input.type = 'range'; input.min = min; input.max = max; input.value = val; input.oninput = function () { label.textContent = 'Threshold: ' + input.value + ' ms'; onChange(parseInt(input.value, 10)); }; wrap.appendChild(label); wrap.appendChild(input); return wrap; }
  function createButton(text, onClick, variant) { var b = document.createElement('button'); b.type = 'button'; b.className = 'ltb-btn' + (variant ? ' ltb-btn-' + variant : ''); b.textContent = text; b.onclick = onClick; return b; }
  
  function createTable(headers, rows, onRowClick) {
    var wrap = document.createElement('div'); wrap.className = 'ltb-table-wrap';
    var table = document.createElement('table'); table.className = 'ltb-table';
    var thead = document.createElement('thead'); var trh = document.createElement('tr');
    headers.forEach(function (h) { var th = document.createElement('th'); th.textContent = h; trh.appendChild(th); });
    thead.appendChild(trh); table.appendChild(thead);
    var tbody = document.createElement('tbody');
    var fragment = document.createDocumentFragment();
    rows.forEach(function (r, i) {
      var tr = document.createElement('tr');
      if (onRowClick) { tr.className = 'ltb-row-clickable'; tr.onclick = function () { onRowClick(i, r); }; }
      r.forEach(function (cell) { var td = document.createElement('td'); td.textContent = cell; tr.appendChild(td); });
      fragment.appendChild(tr);
    });
    tbody.appendChild(fragment); table.appendChild(tbody); wrap.appendChild(table);
    return wrap;
  }

  function renderExplorer(container, lines, keywords, focusStack, onStackChange) {
    container.innerHTML = '';
    if (!focusStack.length) {
      var any = false; var fragment = document.createDocumentFragment();
      lines.forEach(function (row) {
        if (row.isCall) {
          var matchesKw = !keywords.length || keywords.some(function (kw) { return row.raw.toLowerCase().indexOf(kw.toLowerCase()) !== -1; });
          if (matchesKw) {
            any = true; var btn = document.createElement('button'); btn.className = 'ltb-tree-btn'; btn.textContent = row.text || '(blank call line)'; btn.title = row.text; btn.onclick = function () { focusStack.push(row); onStackChange(); }; fragment.appendChild(btn);
          }
        }
      });
      container.appendChild(fragment);
      if (!any) { var empty = document.createElement('div'); empty.className = 'ltb-empty'; empty.textContent = lines.length ? 'No matching call lines found.' : 'No trace loaded yet.'; container.appendChild(empty); }
      return;
    }
    var backBtn = document.createElement('button'); backBtn.className = 'ltb-back-btn'; backBtn.textContent = '← Back'; backBtn.onclick = function () { focusStack.pop(); onStackChange(); }; container.appendChild(backBtn);
    var anchor = focusStack[focusStack.length - 1]; var startIdx = anchor.idx; var anchorDepth = anchor.depth; var endIdx = lines.length;
    for (var i = startIdx + 1; i < lines.length; i++) { if (lines[i].isReturn && lines[i].depth === anchorDepth) { endIdx = i; break; } }
    var windowLines = lines.slice(startIdx, Math.min(endIdx + 1, lines.length));
    var card = document.createElement('div'); card.className = 'ltb-anchor-card'; card.textContent = '-->> (depth ' + anchorDepth + ')  ' + anchor.text; container.appendChild(card);
    var childLabel = document.createElement('div'); childLabel.className = 'ltb-child-label'; childLabel.textContent = 'Inner execution layers'; container.appendChild(childLabel);
    var fragment = document.createDocumentFragment(); var foundChildren = false;
    windowLines.forEach(function (row) {
      if (row.depth === anchorDepth + 1) {
        foundChildren = true;
        if (row.isCall) {
          var btn = document.createElement('button'); btn.className = 'ltb-tree-btn'; btn.textContent = row.text; btn.title = row.text; btn.onclick = function () { focusStack.push(row); onStackChange(); }; fragment.appendChild(btn);
        } else if (row.isReturn) {
          var ret = document.createElement('div'); ret.className = 'ltb-return-line'; ret.textContent = row.text; ret.title = row.text; fragment.appendChild(ret);
        }
      }
    });
    container.appendChild(fragment);
    if (!foundChildren) { var noChild = document.createElement('div'); noChild.className = 'ltb-empty'; noChild.textContent = 'No nested calls inside this layer.'; container.appendChild(noChild); }
    if (endIdx < lines.length) { var closing = document.createElement('div'); closing.className = 'ltb-return-line'; closing.style.borderTop = '1px dashed #38BDF8'; closing.style.marginTop = '6px'; closing.textContent = lines[endIdx].text; closing.title = lines[endIdx].text; container.appendChild(closing); }
  }

  function showMainMenu() { 
      botText('Hi! I\'m <b>' + CONFIG.title + '</b>. You can chat with me naturally below (e.g., <i>"Give me a stack of spool.open"</i> or <i>"Check for operations slower than 200ms"</i>) or use the buttons to start.'); 
      quickReplies([ 
          { label: '🐞 Debug a trace', onClick: startDebuggerFlow }, 
          { label: '🔀 Compare two traces', onClick: startCompareFlow }, 
          { label: '⚡ Check performance', onClick: startPerformanceFlow } 
      ]); 
  }

  function buildPanel() {
    var root = document.createElement('div'); root.id = 'ltb-root';
    root.innerHTML = 
      '<button id="ltb-launcher" aria-label="Open ' + CONFIG.title + '"><span class="ltb-launcher-prompt">ln&gt;</span><span class="ltb-cursor"></span></button>' +
      '<div id="ltb-panel" class="ltb-hidden">' +
        '<div id="ltb-titlebar">' +
          '<span class="ltb-dot ltb-dot-red"></span><span class="ltb-dot ltb-dot-amber"></span><span class="ltb-dot ltb-dot-green"></span>' +
          '<span class="ltb-title">' + CONFIG.title + '</span>' +
          '<button id="ltb-restart" title="Start over">↺</button><button id="ltb-close" title="Close">✕</button>' +
        '</div>' +
        '<div id="ltb-messages"></div>' +
        '<div id="ltb-input-area">' +
          '<input type="text" id="ltb-input" placeholder="Ask me to find errors, check speed..." autocomplete="off">' +
        '</div>' +
      '</div>';
    document.body.appendChild(root);
    
    var launcher = root.querySelector('#ltb-launcher'); 
    var panel = root.querySelector('#ltb-panel'); 
    messagesEl = root.querySelector('#ltb-messages');
    var chatInput = root.querySelector('#ltb-input');

    launcher.onclick = function () { panel.classList.toggle('ltb-hidden'); chatInput.focus(); }; 
    root.querySelector('#ltb-close').onclick = function () { panel.classList.add('ltb-hidden'); }; 
    root.querySelector('#ltb-restart').onclick = function () { messagesEl.innerHTML = ''; showMainMenu(); };

    // Chat Input Logic
    chatInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && chatInput.value.trim() !== '') {
        var msg = chatInput.value.trim();
        userText(msg); 
        chatInput.value = ''; 
        var typing = botText('<i>Thinking...</i>');
        
        setTimeout(async function() {
            typing.remove();
            await handleUserMessage(msg);
        }, 400);
      }
    });

    showMainMenu();
  }

  if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', buildPanel); } else { buildPanel(); }
})();
</script>
</body>
