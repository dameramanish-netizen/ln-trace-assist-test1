<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LN Trace Assist - Pro Edition</title>
</head>
<body>

<script>
/*!
 * LN Trace Assist — Pro Edition
 * Adaptive Direct Stack Extractor
 */
(function () {
  'use strict';

  var CONFIG = { title: 'LN Trace Assist' };

  /* ============================== STYLES ============================== */
  var CSS = [
    '#ltb-root{position:fixed;inset:auto 20px 20px auto;z-index:999999;font-family:system-ui,sans-serif;}',
    '#ltb-launcher{width:56px;height:56px;border-radius:16px;border:1px solid #2A3B57;background:#0B1220;box-shadow:0 10px 30px rgba(0,0,0,.45);cursor:pointer;display:flex;align-items:center;justify-content:center;color:#F2A93C;font-family:monospace;font-weight:700;}',
    '#ltb-panel{position:absolute;bottom:70px;right:0;width:420px;height:650px;background:#0B1220;border:1px solid #2A3B57;border-radius:16px;box-shadow:0 24px 60px rgba(0,0,0,.55);display:flex;flex-direction:column;overflow:hidden;}',
    '#ltb-panel.ltb-hidden{display:none;}',
    '#ltb-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;}',
    '.ltb-msg{display:flex;flex-direction:column;}',
    '.ltb-bubble{padding:10px;border-radius:12px;background:#152036;color:#E2E8F0;font-size:13px;}',
    '.ltb-pre{background:#000;padding:10px;font-family:monospace;font-size:12px;color:#34D399;white-space:pre;overflow:auto;margin-top:8px;}',
    '#ltb-input{width:100%;background:#121B2E;border:1px solid #2A3B57;color:#fff;padding:10px;}'
  ].join('\n');

  document.head.appendChild(document.createElement('style')).textContent = CSS;

  /* =============================== CORE LOGIC =============================== */
  async function streamAndScan(file, queries, callback) {
    const reader = file.stream().pipeThrough(new TextDecoderStream()).getReader();
    let remainder = '', matches = [], lineCount = 0;
    while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const lines = (remainder + (value || '')).split(/\r?\n/);
        remainder = lines.pop();
        for (let line of lines) {
            lineCount++;
            if (queries.every(q => line.toLowerCase().includes(q.toLowerCase()))) {
                matches.push({ line, id: lineCount });
            }
        }
    }
    callback(matches);
  }

  function renderStack(file, lineObj, callback) {
    // This function re-streams to build the stack based on the specific line hit
    let stack = [];
    processStreamedFile(file, (line) => {
        if(line.includes('-->>') && line.includes('(depth')) stack.push(line);
        if(line.includes(lineObj.line)) { callback(stack); return true; }
    });
  }

  /* =============================== UI =============================== */
  function botText(txt) { 
      let d = document.createElement('div'); d.className = 'ltb-msg ltb-msg-bot';
      d.innerHTML = '<div class="ltb-bubble">' + txt + '</div>';
      document.getElementById('ltb-messages').appendChild(d);
  }

  function buildPanel() {
    document.body.insertAdjacentHTML('beforeend', '<div id="ltb-root"><button id="ltb-launcher">ln&gt;</button><div id="ltb-panel" class="ltb-hidden"><div id="ltb-titlebar"><span style="color:#fff;padding:10px">Trace Assist</span><button id="ltb-close" style="float:right">✕</button></div><div id="ltb-messages"></div><input type="text" id="ltb-input" placeholder="Find stack for..."></div></div>');
    
    document.getElementById('ltb-launcher').onclick = () => document.getElementById('ltb-panel').classList.toggle('ltb-hidden');
    document.getElementById('ltb-close').onclick = () => document.getElementById('ltb-panel').classList.add('ltb-hidden');
    
    document.getElementById('ltb-input').onkeydown = async (e) => {
        if(e.key === 'Enter') {
            let val = e.target.value;
            let fileInput = document.createElement('input'); fileInput.type = 'file';
            fileInput.onchange = async () => {
                botText('Scanning for: ' + val);
                await streamAndScan(fileInput.files[0], [val], (matches) => {
                    if (matches.length === 1) {
                        botText('Only 1 occurrence found. Extracting stack...');
                        renderStack(fileInput.files[0], matches[0], (stack) => {
                            let pre = document.createElement('pre'); pre.className = 'ltb-pre';
                            pre.textContent = stack.join('\n');
                            document.getElementById('ltb-messages').appendChild(pre);
                        });
                    } else {
                        botText('Found ' + matches.length + ' occurrences. Please pick the specific one.');
                    }
                });
            };
            fileInput.click();
        }
    };
  }
  buildPanel();
})();
</script>
</body>
</html>
